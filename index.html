<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>情侣双人心情记录</title>
  <style>
    /* ========== 全局样式 ========== */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
      background: linear-gradient(135deg, #fdf2f8 0%, #eff6ff 100%);
      min-height: 100vh;
      color: #334155;
      line-height: 1.6;
    }

    /* 页头 */
    .header {
      text-align: center;
      padding: 24px 16px 12px;
      background: rgba(255, 255, 255, 0.85);
      border-bottom: 1px solid #e2e8f0;
      backdrop-filter: blur(8px);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .header h1 {
      font-size: 1.5rem;
      color: #1e293b;
      margin-bottom: 6px;
    }

    .header .cycle-info {
      font-size: 0.875rem;
      color: #64748b;
    }

    .header .today-badge {
      display: inline-block;
      margin-top: 8px;
      padding: 4px 12px;
      background: #fef3c7;
      color: #92400e;
      border-radius: 999px;
      font-size: 0.8rem;
      font-weight: 600;
    }

    /* 双栏主布局 */
    .main-container {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      max-width: 1400px;
      margin: 0 auto;
      padding: 20px 16px 40px;
    }

    @media (max-width: 900px) {
      .main-container {
        grid-template-columns: 1fr;
      }
    }

    /* 个人板块 */
    .panel {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.06);
      overflow: hidden;
    }

    .panel.male {
      border-top: 4px solid #3b82f6;
    }

    .panel.female {
      border-top: 4px solid #ec4899;
    }

    .panel-header {
      padding: 16px 20px;
      font-size: 1.25rem;
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .panel.male .panel-header {
      background: #eff6ff;
      color: #1d4ed8;
    }

    .panel.female .panel-header {
      background: #fdf2f8;
      color: #be185d;
    }

    .panel-body {
      padding: 20px;
    }

    .section-title {
      font-size: 1rem;
      font-weight: 600;
      color: #475569;
      margin-bottom: 12px;
      padding-bottom: 8px;
      border-bottom: 2px solid #f1f5f9;
    }

    /* 今日记录区 */
    .today-section {
      margin-bottom: 28px;
    }

    .today-date {
      font-size: 0.85rem;
      color: #94a3b8;
      margin-bottom: 12px;
    }

    /* 心情选择 */
    .mood-group {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-bottom: 16px;
    }

    @media (max-width: 500px) {
      .mood-group {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    .mood-option {
      position: relative;
    }

    .mood-option input {
      position: absolute;
      opacity: 0;
      width: 0;
      height: 0;
    }

    .mood-option label {
      display: block;
      padding: 10px 8px;
      text-align: center;
      border: 2px solid #e2e8f0;
      border-radius: 10px;
      cursor: pointer;
      font-size: 0.8rem;
      transition: all 0.2s;
      user-select: none;
    }

    .mood-option input:checked + label {
      border-color: currentColor;
      font-weight: 600;
      transform: scale(1.02);
    }

    /* 六种心情对应颜色 */
    .mood-极度开心 label { color: #ca8a04; background: #fef9c3; }
    .mood-轻微开心 label { color: #16a34a; background: #dcfce7; }
    .mood-平淡普通 label { color: #64748b; background: #f1f5f9; }
    .mood-轻微不开心 label { color: #2563eb; background: #dbeafe; }
    .mood-极度难过 label { color: #1e40af; background: #bfdbfe; }
    .mood-生气烦躁 label { color: #dc2626; background: #fee2e2; }

    .mood-option input:checked + label {
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.12);
    }

    /* 日记输入 */
    .diary-input {
      width: 100%;
      min-height: 100px;
      padding: 12px;
      border: 2px solid #e2e8f0;
      border-radius: 10px;
      font-family: inherit;
      font-size: 0.9rem;
      resize: vertical;
      margin-bottom: 12px;
      transition: border-color 0.2s;
    }

    .diary-input:focus {
      outline: none;
      border-color: #94a3b8;
    }

    /* 按钮 */
    .btn {
      padding: 10px 18px;
      border: none;
      border-radius: 8px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .btn-primary {
      background: #3b82f6;
      color: #fff;
    }

    .panel.female .btn-primary {
      background: #ec4899;
    }

    .btn-primary:hover:not(:disabled) {
      filter: brightness(1.08);
    }

    .btn-outline {
      background: transparent;
      border: 2px solid #cbd5e1;
      color: #475569;
    }

    .btn-outline:hover:not(:disabled) {
      background: #f8fafc;
    }

    .btn-success {
      background: #22c55e;
      color: #fff;
    }

    .btn-danger {
      background: #ef4444;
      color: #fff;
    }

    /* 申请查看区域 */
    .unlock-section {
      margin-top: 20px;
      padding: 16px;
      background: #f8fafc;
      border-radius: 12px;
      border: 1px dashed #cbd5e1;
    }

    .unlock-section h4 {
      font-size: 0.9rem;
      color: #64748b;
      margin-bottom: 10px;
    }

    .unlock-status {
      font-size: 0.85rem;
      color: #64748b;
      margin-top: 8px;
    }

    .partner-diary-box {
      margin-top: 12px;
      padding: 14px;
      background: #fff;
      border-radius: 8px;
      border-left: 4px solid #f59e0b;
      display: none;
    }

    .partner-diary-box.visible {
      display: block;
    }

    .partner-diary-box .label {
      font-size: 0.75rem;
      color: #f59e0b;
      font-weight: 600;
      margin-bottom: 6px;
    }

    .partner-diary-box .content {
      font-size: 0.9rem;
      color: #334155;
      white-space: pre-wrap;
    }

    /* 收到申请时的弹窗提示（仅出现在被申请方板块内） */
    .request-popup {
      margin-top: 16px;
      padding: 18px;
      background: #fffbeb;
      border: 2px solid #f59e0b;
      border-radius: 12px;
      box-shadow: 0 8px 24px rgba(245, 158, 11, 0.2);
      animation: modalIn 0.25s ease;
    }

    .request-popup h4 {
      font-size: 0.95rem;
      color: #92400e;
      margin-bottom: 8px;
    }

    .request-popup p {
      font-size: 0.85rem;
      color: #b45309;
      margin-bottom: 14px;
    }

    .request-popup .modal-actions {
      display: flex;
      gap: 10px;
    }

    /* 365天日历列表 */
    .calendar-section {
      max-height: 480px;
      overflow-y: auto;
    }

    .day-item {
      display: grid;
      grid-template-columns: 72px 1fr 1fr;
      gap: 10px;
      padding: 12px;
      border-bottom: 1px solid #f1f5f9;
      align-items: start;
      font-size: 0.85rem;
    }

    .day-item:hover {
      background: #fafafa;
    }

    .day-item .day-num {
      font-weight: 700;
      color: #94a3b8;
    }

    .day-item .day-num.today {
      color: #f59e0b;
    }

    .day-item .day-date {
      font-size: 0.75rem;
      color: #cbd5e1;
    }

    .record-self {
      padding: 8px 10px;
      background: #f0fdf4;
      border-radius: 8px;
      min-height: 48px;
    }

    .record-self.empty {
      background: #f8fafc;
      color: #cbd5e1;
      font-style: italic;
    }

    .record-self .mood-tag {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 0.75rem;
      font-weight: 600;
      margin-bottom: 4px;
    }

    .record-partner {
      padding: 8px 10px;
      background: #f8fafc;
      border-radius: 8px;
      min-height: 48px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #94a3b8;
      gap: 6px;
    }

    .record-partner .lock-icon {
      font-size: 1.1rem;
    }

    .list-header {
      display: grid;
      grid-template-columns: 72px 1fr 1fr;
      gap: 10px;
      padding: 8px 12px;
      background: #f1f5f9;
      font-size: 0.75rem;
      font-weight: 600;
      color: #64748b;
      position: sticky;
      top: 0;
    }

    @keyframes modalIn {
      from { opacity: 0; transform: scale(0.95) translateY(-10px); }
      to { opacity: 1; transform: scale(1) translateY(0); }
    }

    /* 提示消息 */
    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: #1e293b;
      color: #fff;
      padding: 12px 24px;
      border-radius: 8px;
      font-size: 0.9rem;
      z-index: 2000;
      opacity: 0;
      transition: all 0.3s;
      pointer-events: none;
    }

    .toast.show {
      transform: translateX(-50%) translateY(0);
      opacity: 1;
    }

    /* 周期结束提示 */
    .cycle-ended {
      text-align: center;
      padding: 40px 20px;
      color: #94a3b8;
    }

    /* 心情标签颜色（列表用） */
    .tag-极度开心 { background: #fef9c3; color: #ca8a04; }
    .tag-轻微开心 { background: #dcfce7; color: #16a34a; }
    .tag-平淡普通 { background: #f1f5f9; color: #64748b; }
    .tag-轻微不开心 { background: #dbeafe; color: #2563eb; }
    .tag-极度难过 { background: #bfdbfe; color: #1e40af; }
    .tag-生气烦躁 { background: #fee2e2; color: #dc2626; }
  </style>
</head>
<body>

  <!-- 页头：显示周期信息与今日进度 -->
  <header class="header">
    <h1>💑 情侣双人心情记录</h1>
    <p class="cycle-info" id="cycleInfo">记录周期：365天</p>
    <span class="today-badge" id="todayBadge"></span>
  </header>

  <!-- 双栏主内容 -->
  <main class="main-container">
    <!-- 男生板块 -->
    <section class="panel male" id="malePanel">
      <div class="panel-header">👦 男生</div>
      <div class="panel-body" id="maleBody"></div>
    </section>

    <!-- 女生板块 -->
    <section class="panel female" id="femalePanel">
      <div class="panel-header">👧 女生</div>
      <div class="panel-body" id="femaleBody"></div>
    </section>
  </main>

  <!-- 操作提示 -->
  <div class="toast" id="toast"></div>

  <script>
    /* ============================================================
     * 情侣双人心情记录 - 核心逻辑
     * 数据存储：LocalStorage
     * 记录周期：固定365天，每人每天仅一条记录
     * ============================================================ */

  // ---------- 常量配置 ----------
  const STORAGE_KEY = 'coupleMoodDiary_v1'; // LocalStorage 键名
  const CYCLE_DAYS = 365;                    // 固定记录周期天数
  const MOODS = [                            // 六种固定心情
    '极度开心',
    '轻微开心',
    '平淡普通',
    '轻微不开心',
    '极度难过',
    '生气烦躁'
  ];
  const ROLES = {
    male: { label: '男生', partner: 'female', partnerLabel: '女生' },
    female: { label: '女生', partner: 'male', partnerLabel: '男生' }
  };

  // ---------- 数据读写 ----------

  /**
   * 获取今日日期字符串 YYYY-MM-DD
   */
  function getTodayStr() {
    const d = new Date();
    return formatDate(d);
  }

  /**
   * 格式化日期
   */
  function formatDate(date) {
    const y = date.getFullYear();
    const m = String(date.getMonth() + 1).padStart(2, '0');
    const day = String(date.getDate()).padStart(2, '0');
    return `${y}-${m}-${day}`;
  }

  /**
   * 根据起始日期和天数索引计算具体日期
   */
  function getDateByDayIndex(startDateStr, dayIndex) {
    const d = new Date(startDateStr + 'T00:00:00');
    d.setDate(d.getDate() + dayIndex);
    return formatDate(d);
  }

  /**
   * 计算今天是周期内第几天（0~364），超出范围返回 -1
   */
  function getTodayDayIndex(startDateStr) {
    const start = new Date(startDateStr + 'T00:00:00');
    const today = new Date();
    today.setHours(0, 0, 0, 0);
    const diff = Math.floor((today - start) / 86400000);
    if (diff < 0 || diff >= CYCLE_DAYS) return -1;
    return diff;
  }

  /**
   * 初始化或读取本地数据
   * 数据结构：
   * {
   *   startDate: '2026-07-03',        // 周期起始日
   *   male:   { records: { '0': { mood, diary } } },
   *   female: { records: { '0': { mood, diary } } },
   *   unlock: { date, maleViewFemale, femaleViewMale }, // 当日解锁状态
   *   pendingRequest: { from, date } | null               // 待处理申请
   * }
   */
  function loadData() {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) {
      const data = JSON.parse(raw);
      // 日期变更时重置当日解锁与申请状态
      resetDailyStateIfNeeded(data);
      return data;
    }
    // 首次访问：以今天为周期第0天
    const data = {
      startDate: getTodayStr(),
      male: { records: {} },
      female: { records: {} },
      unlock: {
        date: getTodayStr(),
        maleViewFemale: false,
        femaleViewMale: false
      },
      pendingRequest: null
    };
    saveData(data);
    return data;
  }

  /**
   * 若跨天则重置解锁状态与待处理申请（次日需重新申请）
   */
  function resetDailyStateIfNeeded(data) {
    const today = getTodayStr();
    if (data.unlock.date !== today) {
      data.unlock = {
        date: today,
        maleViewFemale: false,
        femaleViewMale: false
      };
      data.pendingRequest = null;
      saveData(data);
    }
  }

  /**
   * 保存数据到 LocalStorage
   */
  function saveData(data) {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
  }

  // ---------- 业务操作 ----------

  /**
   * 保存某角色今日记录（心情 + 日记），每人每天仅一条，重复保存为覆盖
   */
  function saveTodayRecord(role, mood, diary) {
    const data = loadData();
    const dayIndex = getTodayDayIndex(data.startDate);
    if (dayIndex < 0) {
      showToast('当前不在365天记录周期内');
      return false;
    }
    if (!mood) {
      showToast('请选择今日心情');
      return false;
    }
    data[role].records[String(dayIndex)] = { mood, diary: diary || '' };
    saveData(data);
    showToast('今日记录已保存');
    render();
    return true;
  }

  /**
   * 发起查看对方今日日记的申请
   */
  function requestViewDiary(fromRole) {
    const data = loadData();
    const dayIndex = getTodayDayIndex(data.startDate);
    if (dayIndex < 0) {
      showToast('当前不在365天记录周期内');
      return;
    }
    const toRole = ROLES[fromRole].partner;

    // 已解锁则无需申请
    const unlockKey = fromRole === 'male' ? 'maleViewFemale' : 'femaleViewMale';
    if (data.unlock[unlockKey]) {
      showToast('已获得查看权限');
      return;
    }

    // 已有待处理申请
    if (data.pendingRequest) {
      if (data.pendingRequest.from === fromRole) {
        showToast('申请已发送，等待对方回应');
      } else {
        showToast('对方已发来申请，请先处理');
      }
      return;
    }

    data.pendingRequest = { from: fromRole, date: getTodayStr() };
    saveData(data);
    showToast('查看申请已发送');
    render();
  }

  /**
   * 处理申请：同意或拒绝
   */
  function handleRequest(agreed) {
    const data = loadData();
    if (!data.pendingRequest) return;

    const { from } = data.pendingRequest;
    if (agreed) {
      // 同意：授予申请方查看权限（仅当日有效）
      if (from === 'male') {
        data.unlock.maleViewFemale = true;
      } else {
        data.unlock.femaleViewMale = true;
      }
      showToast('已同意对方查看今日日记');
    } else {
      showToast('已拒绝查看申请');
    }
    data.pendingRequest = null;
    saveData(data);
    render();
  }

  // ---------- UI 渲染 ----------

  /**
   * 渲染单个角色板块
   */
  function renderPanel(role) {
    const data = loadData();
    const info = ROLES[role];
    const dayIndex = getTodayDayIndex(data.startDate);
    const inCycle = dayIndex >= 0;
    const todayRecord = inCycle ? data[role].records[String(dayIndex)] : null;
    const partnerRecord = inCycle ? data[info.partner].records[String(dayIndex)] : null;

    // 解锁状态：我是否可查看对方今日日记
    const unlockKey = role === 'male' ? 'maleViewFemale' : 'femaleViewMale';
    const canViewPartner = data.unlock[unlockKey];

    // 申请状态
    const hasPendingFromMe = data.pendingRequest && data.pendingRequest.from === role;
    const hasPendingToMe = data.pendingRequest && data.pendingRequest.from === info.partner;

    let todaySection = '';
    if (!inCycle) {
      todaySection = '<div class="cycle-ended">记录周期已结束或尚未开始</div>';
    } else {
      const todayDateStr = getDateByDayIndex(data.startDate, dayIndex);
      const moodRadios = MOODS.map(mood => `
        <div class="mood-option mood-${mood}">
          <input type="radio" name="mood-${role}" id="mood-${role}-${mood}" value="${mood}"
            ${todayRecord && todayRecord.mood === mood ? 'checked' : ''}>
          <label for="mood-${role}-${mood}">${mood}</label>
        </div>
      `).join('');

      // 对方今日日记展示（仅解锁后可见）
      let partnerDiaryHtml = '';
      if (canViewPartner && partnerRecord) {
        partnerDiaryHtml = `
          <div class="partner-diary-box visible">
            <div class="label">🔓 ${info.partnerLabel}今日日记（已解锁）</div>
            <div class="content">${escapeHtml(partnerRecord.diary) || '（对方未填写日记）'}</div>
          </div>`;
      } else if (canViewPartner && !partnerRecord) {
        partnerDiaryHtml = `
          <div class="partner-diary-box visible">
            <div class="label">🔓 ${info.partnerLabel}今日日记（已解锁）</div>
            <div class="content">（对方今日尚未记录）</div>
          </div>`;
      }

      let unlockStatus = '';
      if (canViewPartner) {
        unlockStatus = '<span class="unlock-status">✅ 已获得查看权限（仅今日有效）</span>';
      } else if (hasPendingFromMe) {
        unlockStatus = '<span class="unlock-status">⏳ 申请已发送，等待对方回应...</span>';
      }

      // 被申请方专属弹窗：仅收到申请的一方显示同意/拒绝按钮
      let requestPopupHtml = '';
      if (hasPendingToMe) {
        requestPopupHtml = `
          <div class="request-popup">
            <h4>📩 日记查看申请</h4>
            <p>${info.partnerLabel}申请查看你今日的私密日记，是否同意？</p>
            <div class="modal-actions">
              <button class="btn btn-danger" data-action="reject" data-role="${role}">拒绝</button>
              <button class="btn btn-success" data-action="agree" data-role="${role}">同意</button>
            </div>
          </div>`;
      }

      todaySection = `
        <div class="today-section">
          <h3 class="section-title">今日记录</h3>
          <p class="today-date">第 ${dayIndex + 1} 天 · ${todayDateStr}</p>
          <div class="mood-group">${moodRadios}</div>
          <textarea class="diary-input" id="diary-${role}" placeholder="写下今日私密日记（默认对方不可见）...">${todayRecord ? escapeHtml(todayRecord.diary) : ''}</textarea>
          <button class="btn btn-primary" id="save-${role}">保存今日记录</button>

          <div class="unlock-section">
            <h4>查看${info.partnerLabel}今日日记</h4>
            <button class="btn btn-outline" id="request-${role}"
              ${canViewPartner || hasPendingFromMe ? 'disabled' : ''}>
              ${hasPendingFromMe ? '等待回应中...' : '申请查看'}
            </button>
            ${unlockStatus}
            ${partnerDiaryHtml}
          </div>
          ${requestPopupHtml}
        </div>`;
    }

    // 365天日历列表
    const calendarRows = [];
    for (let i = 0; i < CYCLE_DAYS; i++) {
      const dateStr = getDateByDayIndex(data.startDate, i);
      const selfRec = data[role].records[String(i)];
      const isToday = i === dayIndex;

      // 自己的记录：完整展示
      let selfHtml;
      if (selfRec) {
        selfHtml = `
          <span class="mood-tag tag-${selfRec.mood}">${selfRec.mood}</span>
          <div>${escapeHtml(selfRec.diary) || '（无日记）'}</div>`;
      } else {
        selfHtml = '未记录';
      }

      // 对方记录：列表中始终上锁隐藏
      const partnerHtml = `
        <span class="lock-icon">🔒</span>
        <span>已锁定</span>`;

      calendarRows.push(`
        <div class="day-item" data-day="${i}">
          <div>
            <div class="day-num ${isToday ? 'today' : ''}">D${i + 1}</div>
            <div class="day-date">${dateStr}</div>
          </div>
          <div class="record-self ${selfRec ? '' : 'empty'}">${selfHtml}</div>
          <div class="record-partner">${partnerHtml}</div>
        </div>
      `);
    }

    const calendarSection = `
      <div class="calendar-section">
        <h3 class="section-title">365天记录列表</h3>
        <div class="list-header">
          <span>日期</span>
          <span>我的记录</span>
          <span>${info.partnerLabel}（锁定）</span>
        </div>
        ${calendarRows.join('')}
      </div>`;

    return todaySection + calendarSection;
  }

  /**
   * HTML 转义，防止 XSS
   */
  function escapeHtml(str) {
    if (!str) return '';
    return str
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  /**
   * 全页渲染
   */
  function render() {
    const data = loadData();

    // 更新页头信息
    const endDate = getDateByDayIndex(data.startDate, CYCLE_DAYS - 1);
    document.getElementById('cycleInfo').textContent =
      `记录周期：${data.startDate} 至 ${endDate}（共365天）`;

    const dayIndex = getTodayDayIndex(data.startDate);
    const badge = document.getElementById('todayBadge');
    if (dayIndex >= 0) {
      badge.textContent = `今天是第 ${dayIndex + 1} 天`;
      badge.style.display = 'inline-block';
    } else {
      badge.style.display = 'none';
    }

    // 渲染两个板块
    document.getElementById('maleBody').innerHTML = renderPanel('male');
    document.getElementById('femaleBody').innerHTML = renderPanel('female');

    // 绑定事件
    bindEvents();

    // 滚动到今日行
    scrollToToday('male', dayIndex);
    scrollToToday('female', dayIndex);
  }

  /**
   * 日历列表滚动到今日
   */
  function scrollToToday(role, dayIndex) {
    if (dayIndex < 0) return;
    const panel = document.getElementById(role === 'male' ? 'malePanel' : 'femalePanel');
    const todayRow = panel.querySelector(`[data-day="${dayIndex}"]`);
    if (todayRow) {
      todayRow.scrollIntoView({ block: 'center', behavior: 'smooth' });
    }
  }

  /**
   * 绑定按钮事件
   */
  function bindEvents() {
    ['male', 'female'].forEach(role => {
      const panelEl = document.getElementById(role === 'male' ? 'malePanel' : 'femalePanel');
      const saveBtn = document.getElementById(`save-${role}`);
      const requestBtn = document.getElementById(`request-${role}`);

      if (saveBtn) {
        saveBtn.onclick = () => {
          const moodInput = document.querySelector(`input[name="mood-${role}"]:checked`);
          const mood = moodInput ? moodInput.value : '';
          const diary = document.getElementById(`diary-${role}`).value;
          saveTodayRecord(role, mood, diary);
        };
      }

      if (requestBtn) {
        requestBtn.onclick = () => requestViewDiary(role);
      }

      // 被申请方：同意/拒绝按钮（仅出现在收到申请的板块）
      panelEl.querySelectorAll('[data-action="agree"]').forEach(btn => {
        btn.onclick = () => handleRequest(true);
      });
      panelEl.querySelectorAll('[data-action="reject"]').forEach(btn => {
        btn.onclick = () => handleRequest(false);
      });
    });
  }

  /**
   * 显示操作提示
   */
  function showToast(msg) {
    const toast = document.getElementById('toast');
    toast.textContent = msg;
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 2500);
  }

  // ---------- 初始化 ----------
  render();

  // 定时检查跨天重置（每分钟）
  setInterval(() => {
    loadData();
    render();
  }, 60000);

  </script>
</body>
</html>
